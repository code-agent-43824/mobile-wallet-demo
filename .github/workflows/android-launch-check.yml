name: Android launch check
run-name: Android launch check (${{ inputs.arch }} · API ${{ inputs.api-level }} · ${{ inputs.build-mode }})

# On-demand ONLY — deliberately NOT triggered by push/PR, so the normal build
# chain (ci.yml) stays fast. Run it from the Actions tab ("Run workflow"), or
# via the API, when the app misbehaves on launch. It builds the app, statically
# checks the bundled native libs (inventory + 16 KB page alignment), boots an
# emulator, installs + launches the app, and collects logcat + the crash buffer
# (uploaded as an artifact) so a startup crash is actually visible — ci.yml only
# *builds* the APK and never runs it.
#
# x86_64 runs on ubuntu (KVM). arm64-v8a runs on a macOS Apple Silicon runner
# (HVF) — that matches real phones' ABI, the case x86_64 emulators can't cover.
on:
  workflow_dispatch:
    inputs:
      arch:
        description: Emulator ABI — x86_64 (ubuntu/KVM) or arm64-v8a (macOS Apple Silicon, matches real phones)
        type: choice
        options: [x86_64, arm64-v8a]
        default: x86_64
      build-mode:
        description: Build mode to install (debug is most informative; release reproduces R8/proguard-only crashes)
        type: choice
        options: [debug, profile, release]
        default: debug
      api-level:
        description: Android emulator API level
        default: '34'
      ref:
        description: Git ref (branch or SHA) to check out
        default: main

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.41.7
  JAVA_VERSION: '17'

jobs:
  android-launch:
    name: Android launch + logcat
    # arm64-v8a needs an Apple Silicon host to run accelerated; x86_64 uses KVM on Linux.
    runs-on: ${{ inputs.arch == 'arm64-v8a' && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build ${{ inputs.build-mode }} APK
        run: flutter build apk --${{ inputs.build-mode }} --dart-define-from-file=dart_defines.json

      - name: Inspect native libs (inventory + 16 KB alignment)
        # Non-fatal: a misalignment is a strong crash hint, but we still want the
        # emulator launch result in the same run. Surface it as a warning.
        run: |
          python3 scripts/check_apk_alignment.py "build/app/outputs/flutter-apk/app-${{ inputs.build-mode }}.apk" \
            || echo "::warning::Bundled native libs are not 16 KB-aligned — likely crash on Android 15+ 16 KB-page devices (see step log)."

      - name: Enable KVM (Linux x86_64 only)
        if: runner.os == 'Linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch on emulator + collect logs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          arch: ${{ inputs.arch }}
          target: google_apis
          profile: pixel_6
          # arm64 images on the macOS runner boot slowly — give them headroom.
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -camera-front none
          script: MODE=${{ inputs.build-mode }} bash scripts/android_launch_check.sh

      - name: Upload launch logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-launch-logs-${{ inputs.arch }}-api${{ inputs.api-level }}
          path: build/launch-logs/**
          if-no-files-found: warn
