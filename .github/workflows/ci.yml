name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.7
  JAVA_VERSION: '17'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=dart_defines.json

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios_simulator:
    name: iOS Simulator build
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS simulator app
        run: flutter build ios --simulator --debug --dart-define-from-file=dart_defines.json

      - name: Package simulator .app (keep the .app folder, not its contents)
        run: |
          set -euo pipefail
          app="build/ios/iphonesimulator/Runner.app"
          stage="build/ios/sim-artifact"
          rm -rf "$stage"
          mkdir -p "$stage"
          # ditto preserves the bundle; staging it under a parent dir makes
          # upload-artifact keep the ".app" folder instead of stripping it,
          # so the downloaded zip unpacks to a single "Mobile Wallet Demo.app".
          ditto "$app" "$stage/Mobile Wallet Demo.app"

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build/ios/sim-artifact
          if-no-files-found: error

  ios_device:
    name: iOS Device build (unsigned)
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install dependencies
        run: flutter pub get

      - name: Report code-signing status
        env:
          # Secrets are referenced only to test for presence; their values are
          # never printed. A real signed-IPA export would be wired here, gated
          # behind these Secrets (see README -> iOS artifacts). Nothing secret
          # is ever committed to this public repo.
          HAS_SIGNING: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
        run: |
          if [ "$HAS_SIGNING" = "true" ]; then
            echo "iOS signing secrets are present, but signed export is not implemented in this workflow."
            echo "Building UNSIGNED. Extend this job to import the secrets and export a signed .ipa."
          else
            echo "No iOS signing secrets configured -> building an UNSIGNED device app (technical artifact)."
            echo "An unsigned build cannot be installed on a real device. See README -> iOS artifacts."
          fi

      - name: Build iOS device app (unsigned)
        run: flutter build ios --release --no-codesign --dart-define-from-file=dart_defines.json

      - name: Package device .app (keep the .app folder, not its contents)
        run: |
          set -euo pipefail
          app="build/ios/iphoneos/Runner.app"
          stage="build/ios/device-artifact"
          rm -rf "$stage"
          mkdir -p "$stage"
          ditto "$app" "$stage/Mobile Wallet Demo.app"

      - name: Upload iOS device artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-device-build
          path: build/ios/device-artifact
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release --dart-define-from-file=dart_defines.json

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: build/windows/x64/runner/Release
          if-no-files-found: error
